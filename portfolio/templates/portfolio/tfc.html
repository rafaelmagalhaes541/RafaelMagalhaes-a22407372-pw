{% extends "portfolio/base.html" %}

{% block content %}
<h2>TFC</h2>

<section>
    {% for tfc in tfcs %}
    <article>
        <h3>{{ tfc.titulo }}</h3>
        <p>{{ tfc.descricao }}</p>
        <p>Autor: {{ tfc.autor }}</p>
        <p>Orientador: {{ tfc.orientador }}</p>
        <p>Ano: {{ tfc.ano }}</p>
        <p>Tema: {{ tfc.tema }}</p>
    </article>
    {% endfor %}
</section>
{% endblock %}
