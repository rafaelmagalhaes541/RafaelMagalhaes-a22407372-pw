{% extends "portfolio/base.html" %}

{% block content %}
<h2>Formações</h2>

<section>
    {% for form in formacoes %}
    <article>
        <h3>{{ form.titulo }}</h3>
        <p>Tipo: {{ form.tipo }}</p>
        <p>Instituição: {{ form.instituicao }}</p>
        <p>Aluno: {{ form.aluno }}</p>
        <p>{{ form.descricao }}</p>
    </article>
    {% endfor %}
</section>
{% endblock %}
