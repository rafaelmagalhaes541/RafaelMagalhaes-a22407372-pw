{% extends "portfolio/base.html" %}

{% block content %}
<h2>Alunos</h2>

<section>
    {% for aluno in alunos %}
    <article>
        <header>
            <h3>{{ aluno.nome }}</h3>
        </header>

        <p>Número: {{ aluno.numero }}</p>
        <p>Ano: {{ aluno.ano }}</p>
        <p>Licenciatura: {{ aluno.licenciatura }}</p>
        <p>Formação: {{ aluno.formacao_texto }}</p>
    </article>
    {% endfor %}
</section>
{% endblock %}
