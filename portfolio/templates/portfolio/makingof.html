{% extends "portfolio/base.html" %}

{% block content %}
<h2>Making Of</h2>

<section>
    {% for m in makingofs %}
    <article>
        <h3>{{ m.tipo }}</h3>
        <p>{{ m.descricao }}</p>
        <p><strong>Justificação:</strong> {{ m.justificacao }}</p>
        <p><strong>Solução:</strong> {{ m.solucao }}</p>
        <p><strong>Uso de IA:</strong> {{ m.uso_ia }}</p>
        <p>{{ m.descricao_uso_ia }}</p>
    </article>
    {% endfor %}
</section>
{% endblock %}
