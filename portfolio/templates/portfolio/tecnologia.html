{% extends "portfolio/base.html" %}

{% block content %}
<h2>Tecnologias</h2>

<section>
    {% for tech in tecnologias %}
    <article>
        <h3>{{ tech.nome }}</h3>
        <p>Tipo: {{ tech.tipo }}</p>
        <p>{{ tech.descricao }}</p>
        <p>Interesse: {{ tech.interesse }}/10</p>
        <a href="{{ tech.site }}">Site</a>
    </article>
    {% endfor %}
</section>
{% endblock %}
