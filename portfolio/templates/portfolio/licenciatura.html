{% extends "portfolio/base.html" %}

{% block content %}
<h2>Licenciaturas</h2>

<section>
    {% for lic in licenciaturas %}
    <article>
        <h3>{{ lic.nome }}</h3>
        <p>Duração: {{ lic.duracao }} anos</p>
        <p>Créditos: {{ lic.creditos }}</p>
        <p>{{ lic.informacao }}</p>
    </article>
    {% endfor %}
</section>
{% endblock %}
